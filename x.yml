apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/instance: polyfea
    app.kubernetes.io/name: polyfea-controller
    app.kubernetes.io/version: v0.5.8
  name: polyfea-controller
  namespace: polyfea
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: polyfea
      app.kubernetes.io/name: polyfea-controller
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: polyfea-controller
      labels:
        app.kubernetes.io/instance: polyfea
        app.kubernetes.io/name: polyfea-controller
    spec:
      containers:
      - args:
        - --leader-elect
        - --health-probe-bind-address=:8081
        command:
        - /manager
        env:
        - name: POLYFEA_WEB_SERVER_PORT
          value: "8082"
        image: ghcr.io/polyfea/polyfea-controller:v0.5.8
        imagePullPolicy: IfNotPresent
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 15
          periodSeconds: 20
        name: polyfea-controller
        ports:
        - containerPort: 8082
          name: http
          protocol: TCP
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          limits:
            cpu: 500m
            memory: 128Mi
          requests:
            cpu: 10m
            memory: 64Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      serviceAccountName: polyfea-controller
