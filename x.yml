            properties:
              cacheControl:
                description: CacheControl defines the cache control header for the
                  micro frontend. This is only used if the caching strategy is set
                  to 'cache'.
                type: string
              cacheOptions:
                description: CacheOptions specifies the cache settings for the PWA,
