                              format: int32
                              type: integer
                            method:
                              default: GET
                              description: Method specifies the HTTP method to be
                                used with this caching strategy. It defaults to "GET".
                              enum:
                              - DELETE
                              - GET
                              - HEAD
                              - PATCH
                              - POST
                              - PUT
                              type: string
                            pattern:
                              description: Pattern is the URL pattern to which this
                                caching strategy applies.
                              type: string
                            statuses:
                              default:
                              - 0
                              - 200
                              - 201
                              - 202
                              - 204
                              description: Statuses lists the HTTP status codes to
                                be cached. It defaults to [0, 200, 201, 202, 204].
                              items:
                                format: int32
                                type: integer
                              type: array
                            strategy:
                              default: cache-first
                              description: Strategy defines the caching strategy to
                                be used for this URL pattern. It defaults to "cache-first".
                              enum:
                              - cache-first
                              - network-first
                              - cache-only
                              - network-only
                              - stale-while-revalidate
                              type: string
                            syncRetentionMinutes:
                              description: SyncRetentionMinutes specifies the duration
                                (in minutes) to retain synced content in the cache.
                              format: int32
                              type: integer
                          required:
                          - pattern
                          type: object
                        type: array
                      preCache:
                        description: PreCache lists the URLs or resources to be pre-cached
                          when the PWA is installed.
                        items:
                          description: |-
                            PreCacheEntry represents an individual entry in the pre-cache list for a Progressive Web Application (PWA).
                            Each entry specifies a URL to be cached and an optional revision identifier to manage cache updates and invalidation.
                          properties:
                            revision:
                              description: |-
                                Revision is an optional field that specifies a revision identifier for the resource.
                                The revision helps in cache management by allowing the service worker to recognize and update cached assets when their content changes. This ensures users always have access to the most up-to-date resources.
                              type: string
                            url:
                              description: |-
                                URL specifies the resource URL that should be pre-cached. This URL points to the asset that needs to be available offline, ensuring it is cached during the installation of the PWA.
                                URL needs to be relative to the base URL of the frontend class.
                              type: string
                          required:
                          - url
                          type: object
                        type: array
                    type: object
                  polyfeaSWReconcileInterval:
                    default: 1800000
                    description: Time for reconciliation of the strategies from the
                      frontend side.
                    format: int32
                    type: integer
                  webAppManifest:
                    description: WebAppManifest represents the web app manifest file
                      for the PWA.
                    properties:
                      display:
                        description: 'Read more here: https://developer.mozilla.org/en-US/docs/Web/Manifest/display'
                        type: string
                      display_override:
                        description: 'Read more here: https://developer.mozilla.org/en-US/docs/Web/Manifest/display_override'
                        items:
                          type: string
                        type: array
                      icons:
                        description: 'Read more here: https://developer.mozilla.org/en-US/docs/Web/Manifest/icons'
                        items:
                          description: 'Read more here: https://developer.mozilla.org/en-US/docs/Web/Manifest/icons'
                          properties:
                            purpose:
                              description: "Defines the purpose of the image, for
                                example if the image is intended to serve some special
                                purpose in the context of the host OS (i.e., for better
                                integration).\npurpose can have one or more of the
                                following values, separated by spaces:\n\tmonochrome:
                                A user agent can present this icon where a monochrome
                                icon with a solid fill is needed. The color information
                                in the icon is discarded and only the alpha data is
                                used. The icon can then be used by the user agent
                                like a mask over any solid fill.\n\tmaskable: The
                                image is designed with icon masks and safe zone in
                                mind, such that any part of the image outside the
                                safe zone can safely be ignored and masked away by
                                the user agent.\n\tany: The user agent is free to
                                display the icon in any context (this is the default
                                value)."
                              enum:
                              - monochrome
                              - maskable
                              - any
                              type: string
                            sizes:
                              description: A string containing space-separated image
                                dimensions using the same syntax as the sizes attribute.
                              type: string
                            src:
                              description: The path to the image file. If src is a
                                relative URL, the base URL will be the URL of the
