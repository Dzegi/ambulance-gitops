apiVersion: polyfea.github.io/v1alpha1
kind: WebComponent
metadata:
  name: tj-ambulance-ufe-content
spec:
  microFrontend: tj-ambulance-ufe
  element: <pfx>-ambulance-wl-app
  attributes:
    - name: api-base
      value: http://localhost:5001/api # v mojom pripade 5001
    - name: ambulance-id
      value: bobulova
    - name: base-path
      value: ./tj-ambulance-wl/
  displayRules:
    - allOf:
      - context-name: main-content
      - path: "^(\\.?/)?tj-ambulance-wl(/.*)?$"